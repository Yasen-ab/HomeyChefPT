<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - HomeyChef</title>
  <link rel="stylesheet" href="css/password-auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;800&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="site-nav" aria-label="Main">
    <div class="container nav-shell">
      <a href="index.html" class="nav-brand" aria-label="HomeyChef Home">
        <span class="brand-mark" aria-hidden="true">HC</span>
        <span class="brand-text">HomeyChef</span>
      </a>

      <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle menu">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>

      <div class="nav-menu" id="nav-menu">
        <ul class="nav-list" id="nav-list">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        </ul>
        <ul class="nav-list nav-auth-list" id="nav-auth"></ul>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card">
        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-subtitle">Enter your account email and we will send a verification code.</p>

        <form id="forgot-password-form" class="auth-form" novalidate>
          <div id="forgot-password-message" class="message" role="alert"></div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required autocomplete="email">
          </div>

          <button id="forgot-password-submit" type="submit" class="btn">Send Verification Code</button>
        </form>

        <div class="auth-footer">
          Remembered your password? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </section>

  <script src="js/utils.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>

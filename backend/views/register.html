<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HomeyChef</title>
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;800&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="site-nav" aria-label="Main">
    <div class="container nav-shell">
        <a href="index.html" class="nav-brand" aria-label="HomeyChef Home">
            <span class="brand-mark" aria-hidden="true">HC</span>
            <span class="brand-text">HomeyChef</span>
        </a>

        <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle menu">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>

        <div class="nav-menu" id="nav-menu">
            <ul class="nav-list" id="nav-list">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
            </ul>
            <ul class="nav-list nav-auth-list" id="nav-auth"></ul>
        </div>
    </div>
</nav>

    <!-- Register Form -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join HomeyChef and start ordering delicious meals</p>
                
                
                <div class="user-type-tabs">
                    <button class="tab-btn active" data-type="user">User</button>
                    <button class="tab-btn" data-type="chef">Chef</button>
                </div>

                <form id="register-form" class="auth-form">
                    <div id="register-error" class="error-message"></div>
                    
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-group" id="phone-group">
    <label for="phone">Phone</label>
    <input type="tel" id="phone" name="phone">
</div>

<div class="form-group" id="address-group">
    <label for="address">Address</label>
    <textarea id="address" name="address" rows="3"></textarea>
</div>

<!-- الحقول الجديدة للشيف -->
<div class="form-group" id="specialties-group">
    <label for="specialties">Specialties</label>
    <input type="text" id="specialties" name="specialties" 
           placeholder="e.g., Italian, Vegan, Desserts, BBQ">
    <small class="form-hint">Separate specialties with commas</small>
</div>

<div class="form-group" id="bio-group">
    <label for="bio">Bio / About Me</label>
    <textarea id="bio" name="bio" rows="3" 
              placeholder="Tell us about your culinary background, experience, and passion for cooking..."></textarea>
    <small class="form-hint">Max 500 characters</small>
</div>


                    <button type="submit" class="btn btn-primary btn-full">Sign Up</button>
                </form>

                <p class="auth-footer">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </div>
        </div>
    </section>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>

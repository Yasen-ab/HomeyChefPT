<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HomeyChef</title>
    <link rel="stylesheet" href="css/dashboard-user.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;800&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="site-nav" aria-label="Main">
    <div class="container nav-shell">
        <a href="index.html" class="nav-brand" aria-label="HomeyChef Home">
            <span class="brand-mark" aria-hidden="true">HC</span>
            <span class="brand-text">HomeyChef</span>
        </a>

        <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle menu">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
        </button>

        <div class="nav-menu" id="nav-menu">
            <ul class="nav-list" id="nav-list">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
            </ul>
            <ul class="nav-list nav-auth-list" id="nav-auth"></ul>
        </div>
    </div>
</nav>
    <!-- Dashboard Section -->
    <section class="dashboard">
        <div class="container">
            <h1 class="dashboard-title">Welcome, <span id="user-name"></span>!</h1>
            
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-info">
                        <h3 id="total-orders">0</h3>
                        <p>Total Orders</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-info">
                        <h3 id="pending-orders">0</h3>
                        <p>Pending Orders</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <h3 id="completed-orders">0</h3>
                        <p>Completed Orders</p>
                    </div>
                </div>
            </div>

            <!-- Recent Orders -->
            <!-- <div class="dashboard-section">
                <h2>Recent Orders</h2>
                <div id="recent-orders-container" class="orders-list">
                    Orders will be loaded here
                </div>
            </div> -->

            <!-- Profile Section -->
            <div class="dashboard-section">
                <h2>Profile</h2>
                <div class="profile-card">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="profile-name" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="profile-email" class="form-control" disabled>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="profile-phone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="profile-address" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="profile-actions">
                        <button class="btn btn-primary" id="update-profile-btn">Update Profile</button>
                        <a class="btn btn-secondary" href="change_password.html">Change Password</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/utils.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="js/notification-client.js"></script>
    <script src="js/dashboard-user.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>

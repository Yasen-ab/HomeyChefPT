<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - HomeyChef</title>
  <link rel="stylesheet" href="css/password-auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;800&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="site-nav" aria-label="Main">
    <div class="container nav-shell">
      <a href="index.html" class="nav-brand" aria-label="HomeyChef Home">
        <span class="brand-mark" aria-hidden="true">HC</span>
        <span class="brand-text">HomeyChef</span>
      </a>

      <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle menu">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>

      <div class="nav-menu" id="nav-menu">
        <ul class="nav-list" id="nav-list">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
        </ul>
        <ul class="nav-list nav-auth-list" id="nav-auth"></ul>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="container">
      <div class="auth-card">
        <h1 class="auth-title">Change Password</h1>
        <p class="auth-subtitle">Update your account password securely.</p>

        <form id="change-password-form" class="auth-form" novalidate>
          <div id="change-password-message" class="message" role="alert"></div>

          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <input type="password" id="currentPassword" name="currentPassword" required autocomplete="current-password">
          </div>

          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" required minlength="8" autocomplete="new-password">
            <p class="field-help">Use at least 8 characters.</p>
          </div>

          <div class="form-group">
            <label for="confirmNewPassword">Confirm New Password</label>
            <input type="password" id="confirmNewPassword" name="confirmNewPassword" required minlength="8" autocomplete="new-password">
          </div>

          <button id="change-password-submit" type="submit" class="btn">Update Password</button>
        </form>

        <div class="auth-footer">
          <a href="dashboard-user.html">Back to dashboard</a>
        </div>
      </div>
    </div>
  </section>

  <script src="js/utils.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/change-password.js"></script>
</body>
</html>
